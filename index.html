<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSS AI - The AI That Builds Anything</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .ad-container {
            position: relative;
            width: 1280px;
            height: 720px;
            background: #0a0a0a;
            overflow: hidden;
            box-shadow: 0 20px 100px rgba(14, 165, 233, 0.3);
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: #0ea5e9;
            width: 0%;
            z-index: 1000;
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.8);
        }

        .ai-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(14, 165, 233, 0.2);
            border: 2px solid #0ea5e9;
            padding: 8px 16px;
            border-radius: 20px;
            color: #0ea5e9;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            z-index: 1000;
            animation: badgeGlow 2s ease-in-out infinite;
        }

        @keyframes badgeGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(14, 165, 233, 0.5); }
            50% { box-shadow: 0 0 25px rgba(14, 165, 233, 0.9); }
        }

        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .scene.active {
            opacity: 1;
        }

        /* Scene 1: Logo Slam */
        .pulse-bg {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 1.5s ease-out forwards;
        }

        @keyframes pulse {
            0% { transform: scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }

        .logo {
            font-size: 180px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 40px rgba(14, 165, 233, 0.8), 0 0 80px rgba(14, 165, 233, 0.4);
            animation: logoSlam 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            letter-spacing: 8px;
        }

        @keyframes logoSlam {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* Scene 2: Subtitle */
        .subtitle {
            font-size: 48px;
            font-weight: 600;
            color: #ffffff;
            animation: fadeInUp 1s ease forwards;
        }

        @keyframes fadeInUp {
            0% { transform: translateY(30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* Scene 3: Feature Cards */
        .cards-container {
            display: flex;
            gap: 40px;
        }

        .card {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.1) 0%, rgba(14, 165, 233, 0.05) 100%);
            border: 2px solid #0ea5e9;
            border-radius: 20px;
            padding: 40px 50px;
            min-width: 280px;
            opacity: 0;
            animation: slideIn 0.6s ease forwards;
        }

        .card:nth-child(1) { animation-delay: 0s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.4s; }

        @keyframes slideIn {
            0% { transform: translateX(-100px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        .card-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .card-text {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
        }

        /* Scene 4: Stat Counter */
        .stat-container {
            text-align: center;
        }

        .stat-number {
            font-size: 120px;
            font-weight: 900;
            color: #0ea5e9;
            text-shadow: 0 0 40px rgba(14, 165, 233, 0.6);
            margin-bottom: 20px;
        }

        .stat-label {
            font-size: 40px;
            font-weight: 600;
            color: #ffffff;
        }

        /* Scene 5: Testimonial */
        .quote-container {
            max-width: 900px;
            text-align: center;
        }

        .quote-text {
            font-size: 48px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .quote-author {
            font-size: 32px;
            color: #0ea5e9;
            font-weight: 700;
        }

        /* Scene 6: Split Screen */
        .split-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .split-left, .split-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }

        .split-left {
            background: rgba(14, 165, 233, 0.05);
            border-right: 2px solid #0ea5e9;
        }

        .typing-icon {
            font-size: 120px;
            margin-bottom: 30px;
            animation: typing 1s ease-in-out infinite;
        }

        @keyframes typing {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .typing-text {
            font-size: 36px;
            font-weight: 600;
            color: #ffffff;
        }

        .deploy-icon {
            font-size: 120px;
            margin-bottom: 30px;
            animation: rocket 1.5s ease-in-out infinite;
        }

        @keyframes rocket {
            0%, 100% { transform: translateY(0) rotate(-45deg); }
            50% { transform: translateY(-20px) rotate(-45deg); }
        }

        .deploy-text {
            font-size: 36px;
            font-weight: 600;
            color: #0ea5e9;
        }

        /* Scene 7: Final CTA */
        .cta-container {
            text-align: center;
        }

        .cta-logo {
            font-size: 160px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 60px rgba(14, 165, 233, 0.8);
            margin-bottom: 30px;
            letter-spacing: 12px;
        }

        .cta-tagline {
            font-size: 42px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 50px;
        }

        .cta-button {
            display: inline-block;
            background: #0ea5e9;
            color: #ffffff;
            font-size: 36px;
            font-weight: 700;
            padding: 25px 60px;
            border-radius: 50px;
            text-decoration: none;
            animation: ctaPulse 1.5s ease-in-out infinite;
            box-shadow: 0 0 40px rgba(14, 165, 233, 0.6);
        }

        @keyframes ctaPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(14, 165, 233, 0.6); }
            50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(14, 165, 233, 0.9); }
        }

        @media (max-width: 1280px) {
            .ad-container {
                width: 100vw;
                height: 56.25vw;
                max-height: 100vh;
                max-width: 177.78vh;
            }
        }
    </style>
</head>
<body>
    <div class="ad-container">
        <div class="ai-badge">ALL-AI MADE</div>
        <div class="progress-bar" id="progressBar"></div>

        <!-- Scene 1: Logo Slam (0-2s) -->
        <div class="scene" id="scene1">
            <div class="pulse-bg"></div>
            <div class="logo">BOSS</div>
        </div>

        <!-- Scene 2: Subtitle (2-4s) -->
        <div class="scene" id="scene2">
            <div class="logo" style="font-size: 140px; margin-bottom: 30px;">BOSS</div>
            <div class="subtitle">The AI that builds anything</div>
        </div>

        <!-- Scene 3: Feature Cards (4-6s) -->
        <div class="scene" id="scene3">
            <div class="cards-container">
                <div class="card">
                    <div class="card-icon">⚡</div>
                    <div class="card-text">Writes code</div>
                </div>
                <div class="card">
                    <div class="card-icon">🚀</div>
                    <div class="card-text">Deploys live</div>
                </div>
                <div class="card">
                    <div class="card-icon">🧠</div>
                    <div class="card-text">Learns every day</div>
                </div>
            </div>
        </div>

        <!-- Scene 4: Stat Counter (6-8s) -->
        <div class="scene" id="scene4">
            <div class="stat-container">
                <div class="stat-number" id="statNumber">0</div>
                <div class="stat-label">files built in 6 minutes</div>
            </div>
        </div>

        <!-- Scene 5: Testimonial (8-10s) -->
        <div class="scene" id="scene5">
            <div class="quote-container">
                <div class="quote-text">"I just told it what I wanted. It built the app."</div>
                <div class="quote-author">@galen</div>
            </div>
        </div>

        <!-- Scene 6: Split Screen (10-12s) -->
        <div class="scene" id="scene6">
            <div class="split-container">
                <div class="split-left">
                    <div class="typing-icon">💬</div>
                    <div class="typing-text">Person typing</div>
                </div>
                <div class="split-right">
                    <div class="deploy-icon">🚀</div>
                    <div class="deploy-text">Website going live</div>
                </div>
            </div>
        </div>

        <!-- Scene 7: Final CTA (12-15s) -->
        <div class="scene" id="scene7">
            <div class="cta-container">
                <div class="cta-logo">BOSS</div>
                <div class="cta-tagline">Your AI. Your rules. Always building.</div>
                <a href="https://getbossai.io" class="cta-button">Try BOSS Free →</a>
            </div>
        </div>
    </div>

    <script>
        const scenes = [
            { id: 'scene1', start: 0, end: 2000 },
            { id: 'scene2', start: 2000, end: 4000 },
            { id: 'scene3', start: 4000, end: 6000 },
            { id: 'scene4', start: 6000, end: 8000 },
            { id: 'scene5', start: 8000, end: 10000 },
            { id: 'scene6', start: 10000, end: 12000 },
            { id: 'scene7', start: 12000, end: 15000 }
        ];

        let startTime;
        let animationFrame;

        function startAd() {
            startTime = Date.now();
            updateProgress();
            playScenes();
        }

        function updateProgress() {
            const elapsed = Date.now() - startTime;
            const progress = Math.min((elapsed / 15000) * 100, 100);
            document.getElementById('progressBar').style.width = progress + '%';

            if (elapsed < 15000) {
                animationFrame = requestAnimationFrame(updateProgress);
            } else {
                setTimeout(() => {
                    resetAd();
                    startAd();
                }, 100);
            }
        }

        function playScenes() {
            scenes.forEach(scene => {
                setTimeout(() => {
                    document.getElementById(scene.id).classList.add('active');
                }, scene.start);

                setTimeout(() => {
                    document.getElementById(scene.id).classList.remove('active');
                }, scene.end);
            });
