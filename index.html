<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOSS AI - The AI That Builds Anything</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    font-family: 'Inter', sans-serif;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #stage {
    width: 100vw;
    height: 100vh;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Progress bar */
  #progress {
    position: absolute;
    bottom: 0; left: 0;
    height: clamp(2px, 0.5vh, 4px);
    background: #0ea5e9;
    width: 0%;
    transition: none;
    box-shadow: 0 0 8px #0ea5e9;
    z-index: 100;
  }

  /* ALL-AI MADE badge */
  #badge {
    position: absolute;
    top: clamp(12px, 2vh, 20px);
    right: clamp(12px, 2vw, 20px);
    border: 1.5px solid #0ea5e9;
    color: #0ea5e9;
    font-size: clamp(9px, 2vw, 12px);
    font-weight: 700;
    letter-spacing: clamp(1px, 0.3vw, 2px);
    padding: clamp(4px, 1vh, 6px) clamp(8px, 2vw, 12px);
    border-radius: 20px;
    animation: badgePulse 2s ease-in-out infinite;
    z-index: 100;
  }

  @keyframes badgePulse {
    0%, 100% { box-shadow: 0 0 6px #0ea5e9; opacity: 0.9; }
    50% { box-shadow: 0 0 18px #0ea5e9, 0 0 32px #0ea5e944; opacity: 1; }
  }

  /* Scenes */
  .scene {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.4s ease;
    padding: clamp(20px, 5vw, 60px);
    text-align: center;
  }
  .scene.active { opacity: 1; }

  /* Scene 1 — BOSS logo slam */
  #s1 .logo {
    font-size: clamp(48px, 15vw, 180px);
    font-weight: 900;
    letter-spacing: clamp(-2px, -0.3vw, -4px);
    color: #fff;
    text-shadow: 0 0 clamp(20px, 4vw, 40px) #0ea5e9, 0 0 clamp(40px, 8vw, 80px) #0ea5e955;
    animation: logoSlam 0.5s cubic-bezier(0.17, 0.67, 0.29, 1.3) forwards;
    transform: scale(0.3);
    opacity: 0;
  }
  @keyframes logoSlam {
    to { transform: scale(1); opacity: 1; }
  }
  #s1 .tagline {
    font-size: clamp(10px, 2.5vw, 22px);
    color: #0ea5e9;
    letter-spacing: clamp(2px, 0.5vw, 4px);
    font-weight: 700;
    margin-top: clamp(4px, 1vh, 8px);
    opacity: 0;
    animation: fadeUp 0.5s 0.6s ease forwards;
  }

  /* Scene 2 — three cards */
  #s2 .cards {
    display: flex;
    flex-direction: column;
    gap: clamp(10px, 2vh, 16px);
    width: 100%;
    max-width: clamp(300px, 90vw, 420px);
  }
  .card {
    background: #111;
    border: 1px solid #0ea5e933;
    border-left: clamp(2px, 0.4vw, 3px) solid #0ea5e9;
    padding: clamp(12px, 2vh, 20px) clamp(16px, 4vw, 28px);
    border-radius: clamp(6px, 1vw, 8px);
    font-size: clamp(14px, 3.5vw, 22px);
    font-weight: 700;
    opacity: 0;
    transform: translateX(-40px);
    text-align: left;
  }
  .card span { 
    color: #0ea5e9; 
    margin-right: clamp(6px, 1.5vw, 10px);
    font-size: clamp(16px, 4vw, 24px);
  }
  .card.slide { animation: slideIn 0.35s ease forwards; }
  @keyframes slideIn { to { opacity: 1; transform: translateX(0); } }

  /* Scene 3 — stat counter */
  #s3 .stat-label {
    font-size: clamp(11px, 2.8vw, 18px);
    color: #888;
    letter-spacing: clamp(1px, 0.3vw, 2px);
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: clamp(8px, 2vh, 12px);
  }
  #s3 .stat-num {
    font-size: clamp(56px, 14vw, 140px);
    font-weight: 900;
    color: #0ea5e9;
    line-height: 1;
    text-shadow: 0 0 clamp(20px, 4vw, 40px) #0ea5e966;
  }
  #s3 .stat-sub {
    font-size: clamp(12px, 3vw, 22px);
    color: #ccc;
    margin-top: clamp(8px, 2vh, 12px);
    font-weight: 400;
  }

  /* Scene 4 — quote */
  #s4 .quote {
    font-size: clamp(16px, 4vw, 32px);
    font-weight: 700;
    line-height: 1.4;
    max-width: clamp(280px, 85vw, 600px);
    color: #fff;
    padding: 0 clamp(16px, 4vw, 40px);
  }
  #s4 .quote::before { 
    content: '"'; 
    color: #0ea5e9; 
    font-size: 1.5em; 
    line-height: 0; 
    vertical-align: -0.3em; 
    margin-right: clamp(2px, 0.5vw, 4px); 
  }
  #s4 .quote::after  { 
    content: '"'; 
    color: #0ea5e9; 
    font-size: 1.5em; 
    line-height: 0; 
    vertical-align: -0.3em; 
    margin-left: clamp(2px, 0.5vw, 4px); 
  }
  #s4 .author {
    margin-top: clamp(12px, 3vh, 20px);
    color: #0ea5e9;
    font-size: clamp(11px, 2.5vw, 16px);
    font-weight: 700;
    letter-spacing: clamp(0.5px, 0.2vw, 1px);
  }

  /* Scene 5 — final CTA */
  #s5 .logo-final {
    font-size: clamp(48px, 13vw, 130px);
    font-weight: 900;
    letter-spacing: clamp(-2px, -0.3vw, -3px);
    text-shadow: 0 0 clamp(25px, 5vw, 50px) #0ea5e9, 0 0 clamp(50px, 10vw, 100px) #0ea5e944;
  }
  #s5 .mission {
    font-size: clamp(11px, 2.8vw, 20px);
    color: #aaa;
    margin-top: clamp(6px, 1.5vh, 10px);
    letter-spacing: clamp(0.5px, 0.2vw, 1px);
  }
  #s5 .cta {
    margin-top: clamp(20px, 4vh, 36px);
    background: #0ea5e9;
    color: #000;
    font-size: clamp(13px, 3.2vw, 20px);
    font-weight: 900;
    letter-spacing: clamp(0.5px, 0.2vw, 1px);
    padding: clamp(12px, 2.5vh, 18px) clamp(24px, 6vw, 48px);
    border-radius: 50px;
    text-decoration: none;
    display: inline-block;
    animation: ctaPulse 1.2s ease-in-out infinite;
    box-shadow: 0 4px 12px rgba(14, 165, 233, 0.4);
  }
  @keyframes ctaPulse {
    0%, 100% { box-shadow: 0 4px 12px rgba(14, 165, 233, 0.4), 0 0 0 0 #0ea5e966; }
    50% { box-shadow: 0 6px 20px rgba(14, 165, 233, 0.6), 0 0 0 clamp(8px, 2vw, 16px) #0ea5e900; }
  }
  #s5 .domain {
    margin-top: clamp(10px, 2vh, 14px);
    color: #444;
    font-size: clamp(10px, 2.2vw, 14px);
    letter-spacing: clamp(1px, 0.3vw, 2px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(clamp(8px, 2vh, 16px)); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Background glow orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(clamp(40px, 10vw, 80px));
    pointer-events: none;
    z-index: 0;
  }
  .orb1 { 
    width: clamp(200px, 50vw, 600px); 
    height: clamp(200px, 50vw, 600px); 
    background: #0ea5e911; 
    top: -10%; 
    left: -10%; 
  }
  .orb2 { 
    width: clamp(160px, 40vw, 500px); 
    height: clamp(160px, 40vw, 500px); 
    background: #0ea5e90a; 
    bottom: -10%; 
    right: -5%; 
  }

  /* Mobile-specific adjustments */
  @media (max-width: 480px) {
    #s1 .logo {
      font-size: clamp(56px, 18vw, 100px);
    }
    #s1 .tagline {
      font-size: clamp(9px, 3vw, 14px);
      letter-spacing: clamp(1px, 0.4vw, 2px);
    }
    .card {
      font-size: clamp(15px, 4vw, 18px);
    }
    #s3 .stat-num {
      font-size: clamp(64px, 18vw, 100px);
    }
    #s4 .quote {
      font-size: clamp(17px, 4.5vw, 24px);
    }
    #s5 .logo-final {
      font-size: clamp(52px, 15vw, 90px);
    }
    #s5 .cta {
      font-size: clamp(14px, 3.8vw, 18px);
      padding: clamp(14px, 3vh, 16px) clamp(28px, 7vw, 40px);
    }
  }

  /* Desktop enhancements */
  @media (min-width: 1024px) {
    #s1 .logo {
      text-shadow: 0 0 60px #0ea5e9, 0 0 120px #0ea5e955;
    }
    .card {
      transition: all 0.3s ease;
    }
    .card:hover {
      transform: translateX(8px) !important;
      border-left-color: #0ea5e9;
      box-shadow: 0 4px 20px rgba(14, 165, 233, 0.2);
    }
    #s5 .cta {
      transition: all 0.3s ease;
    }
    #s5 .cta:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 30px rgba(14, 165, 233, 0.6);
    }
  }
</style>
</head>
<body>
<div id="stage">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div id="badge">ALL-AI MADE</div>
  <div id="progress"></div>

  <!-- Scene 1: BOSS logo slam (0-3s) -->
  <div class="scene" id="s1">
    <div class="logo" id="logoEl">BOSS</div>
    <div class="tagline">THE AI THAT BUILDS ANYTHING</div>
  </div>

  <!-- Scene 2: Three capability cards (3-6s) -->
  <div class="scene" id="s2">
    <div class="cards">
      <div class="card" id="c1"><span>⚡</span> Writes production code</div>
      <div class="card" id="c2"><span>🚀</span> Deploys it live instantly</div>
      <div class="card" id="c3"><span>🧠</span> Learns and gets smarter daily</div>
    </div>
  </div>
